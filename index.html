<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏥 Terapie Giornaliere</title>
<meta name="theme-color" content="#F7F3EE">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Terapie">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;0,700;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #F7F3EE; --surface: #FFFFFF; --sidebar: #1C1410;
    --accent: #C97B3F; --accent2: #7A9E5F; --danger: #C0392B; --warn: #E67E22;
    --text: #1C1410; --muted: #8A7060; --border: #E5DDD5; --light: #EDE5DB;
    --font-display: 'Fraunces', serif; --font-body: 'DM Sans', sans-serif;
    --radius: 12px; --shadow: 0 2px 16px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* TOPBAR */
  .topbar { background: var(--sidebar); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
  .topbar-logo { display: flex; align-items: center; gap: 10px; }
  .topbar-logo h1 { font-family: var(--font-display); font-size: 17px; font-weight: 700; color: #fff; }
  .topbar-logo p { font-size: 10px; color: #8A7060; margin-top: 1px; }
  .topbar-date { font-size: 11px; color: #8A7060; text-align: right; }

  /* NAV BOTTOM */
  .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 50; padding-bottom: env(safe-area-inset-bottom); }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 4px; cursor: pointer; color: var(--muted); font-size: 10px; font-family: var(--font-body); border: none; background: none; transition: all 0.2s; position: relative; text-transform: uppercase; letter-spacing: 0.04em; }
  .nav-btn .ni { font-size: 20px; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn.active::after { content: ''; position: absolute; top: 0; left: 20%; right: 20%; height: 2px; background: var(--accent); border-radius: 0 0 4px 4px; }
  .nav-badge { position: absolute; top: 6px; right: calc(50% - 18px); background: var(--danger); color: #fff; border-radius: 20px; font-size: 10px; font-weight: 700; padding: 1px 5px; min-width: 16px; text-align: center; }

  /* CONTENT */
  .content { padding: 20px 16px 90px; max-width: 680px; margin: 0 auto; }
  .page { display: none; }
  .page.active { display: block; }

  /* TITLES */
  .section-title { font-family: var(--font-display); font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .section-sub { font-size: 12px; color: var(--muted); margin-bottom: 18px; }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 10px; border: none; font-family: var(--font-body); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.18s; white-space: nowrap; }
  .btn-primary { background: var(--accent); color: #fff; font-weight: 600; }
  .btn-primary:hover { background: #b56d34; }
  .btn-success { background: var(--accent2); color: #fff; }
  .btn-success:hover { background: #6a8e52; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-ghost { background: var(--light); color: var(--text); }
  .btn-ghost:hover { background: var(--border); }
  .btn-sm { padding: 5px 11px; font-size: 12px; }

  /* CARDS */
  .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 12px; }
  .card-header { padding: 12px 16px; background: var(--accent); display: flex; align-items: center; gap: 10px; }
  .card-header h3 { color: #fff; font-size: 14px; font-weight: 600; font-family: var(--font-display); flex: 1; }
  .card-body { padding: 14px 16px; }

  /* OGGI - promemoria */
  .oggi-slot { margin-bottom: 20px; }
  .oggi-slot-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .oggi-slot-time { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--accent); }
  .oggi-slot-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .oggi-item { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; transition: box-shadow 0.2s; }
  .oggi-item.done { opacity: 0.5; }
  .oggi-item.done .oggi-nome { text-decoration: line-through; }
  .oggi-item.past { border-color: var(--danger); background: #fdecea; }
  .oggi-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .oggi-dot.done { background: var(--accent2); }
  .oggi-dot.past { background: var(--danger); }
  .oggi-info { flex: 1; }
  .oggi-nome { font-size: 14px; font-weight: 600; }
  .oggi-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .oggi-scorte { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; margin-left: 6px; flex-shrink: 0; }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 18px; }
  .stat-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px 10px; text-align: center; }
  .stat-card .num { font-family: var(--font-display); font-size: 26px; font-weight: 700; color: var(--accent); }
  .stat-card .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 2px; }

  /* TERAPIA ITEM */
  .terapia-item { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 10px; }
  .terapia-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .terapia-icon { font-size: 24px; flex-shrink: 0; }
  .terapia-info { flex: 1; }
  .terapia-info h4 { font-size: 15px; font-weight: 600; font-family: var(--font-display); }
  .terapia-info p { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .terapia-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .terapia-orari { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .orario-tag { background: var(--light); border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 4px; }
  .scorte-bar { margin-top: 10px; }
  .scorte-bar-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .scorte-bar-bg { background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; }
  .scorte-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }

  /* BADGE */
  .badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-green { background: #e8f5e0; color: #4a7c2f; }
  .badge-red { background: #fdecea; color: var(--danger); }
  .badge-orange { background: #fef3e2; color: var(--warn); }
  .badge-blue { background: #e3f0ff; color: #2563eb; }

  /* STORICO */
  .storico-item { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .storico-check { font-size: 18px; flex-shrink: 0; }
  .storico-info { flex: 1; }
  .storico-info h4 { font-size: 13px; font-weight: 600; }
  .storico-info p { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 24px 20px 32px; width: 100%; max-width: 680px; box-shadow: 0 -8px 40px rgba(0,0,0,0.2); max-height: 92vh; overflow-y: auto; }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal h3 { font-family: var(--font-display); font-size: 18px; font-weight: 700; margin-bottom: 18px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 13px; border-radius: 10px; border: 1px solid var(--border); font-family: var(--font-body); font-size: 13px; background: var(--bg); color: var(--text); outline: none; transition: border 0.2s; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-actions .btn { flex: 1; justify-content: center; }

  /* ORARI EDITOR */
  .orari-editor { background: var(--bg); border-radius: 10px; padding: 12px; margin-bottom: 14px; }
  .orario-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .orario-row input { flex: 1; }
  .orario-row select { flex: 1; }
  .btn-add-orario { background: none; border: 1px dashed var(--border); color: var(--muted); border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; width: 100%; margin-top: 4px; transition: all 0.2s; }
  .btn-add-orario:hover { border-color: var(--accent); color: var(--accent); }
  .btn-remove-orario { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 18px; padding: 2px; flex-shrink: 0; }

  /* NOTIF BANNER */
  .notif-banner { background: #fff8f0; border: 1px solid #f5cfa0; border-radius: var(--radius); padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; font-size: 13px; }

  /* TOAST */
  .toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%) translateY(-10px); background: var(--sidebar); color: #fff; padding: 10px 20px; border-radius: 30px; font-size: 13px; z-index: 999; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty .ei { font-size: 44px; display: block; margin-bottom: 10px; }
  .loader { text-align: center; padding: 32px; color: var(--muted); font-size: 13px; }

  select option { background: #fff; color: #1C1410; }

  /* ALLERTA SCORTE */
  .allerta-scorte { background: #fdecea; border: 1px solid #f5b7b1; border-radius: var(--radius); padding: 12px 16px; margin-bottom: 14px; }
  .allerta-scorte h4 { font-size: 13px; font-weight: 700; color: var(--danger); margin-bottom: 6px; }
  .allerta-scorte p { font-size: 12px; color: var(--danger); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <div>
      <h1>🏥 Terapie Giornaliere</h1>
      <p>by Roberto</p>
    </div>
  </div>
  <div class="topbar-date" id="topbar-date"></div>
</div>

<div class="content">

  <!-- OGGI -->
  <div class="page active" id="page-oggi">
    <div id="notif-banner"></div>
    <div id="allerta-scorte-banner"></div>
    <div class="stats-row" id="stats-oggi"></div>
    <div id="oggi-content"></div>
  </div>

  <!-- TERAPIE -->
  <div class="page" id="page-terapie">
    <p class="section-title">Le mie terapie</p>
    <p class="section-sub">Gestisci medicine, orari e scorte</p>
    <div style="margin-bottom:16px">
      <button class="btn btn-primary" onclick="openModalTerapia()">+ Aggiungi medicina</button>
    </div>
    <div id="lista-terapie"></div>
  </div>

  <!-- STORICO -->
  <div class="page" id="page-storico">
    <p class="section-title">Storico assunzioni</p>
    <p class="section-sub">Registro completo delle assunzioni</p>
    <div class="form-row" style="margin-bottom:14px">
      <div class="form-group" style="margin:0">
        <label>Dal</label>
        <input type="date" id="st-dal" onchange="loadStorico()">
      </div>
      <div class="form-group" style="margin:0">
        <label>Al</label>
        <input type="date" id="st-al" onchange="loadStorico()">
      </div>
    </div>
    <div id="lista-storico"></div>
  </div>

</div>

<!-- NAV -->
<nav class="nav-bottom">
  <button class="nav-btn active" onclick="showPage('oggi')" id="nav-oggi">
    <span class="ni">⏰</span><span>Oggi</span>
    <span class="nav-badge" id="badge-oggi" style="display:none">0</span>
  </button>
  <button class="nav-btn" onclick="showPage('terapie')" id="nav-terapie">
    <span class="ni">💊</span><span>Terapie</span>
    <span class="nav-badge" id="badge-scorte" style="display:none">!</span>
  </button>
  <button class="nav-btn" onclick="showPage('storico')" id="nav-storico">
    <span class="ni">📋</span><span>Storico</span>
  </button>
</nav>

<div class="toast" id="toast"></div>

<!-- MODAL TERAPIA -->
<div class="modal-overlay" id="modal-terapia">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 id="modal-terapia-title">Aggiungi medicina</h3>
    <input type="hidden" id="ter-id">

    <div class="form-row">
      <div class="form-group"><label>Nome medicina *</label><input type="text" id="ter-nome" placeholder="es. Tachipirina"></div>
      <div class="form-group"><label>Formato</label>
        <select id="ter-formato">
          <option>compressa</option><option>capsula</option><option>gocce</option>
          <option>sciroppo</option><option>bustina</option><option>fiala</option>
          <option>spray</option><option>cerotto</option><option>pomata</option><option>altro</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group"><label>Principio attivo</label><input type="text" id="ter-principio" placeholder="es. Paracetamolo"></div>
      <div class="form-group"><label>Dosaggio</label>
        <div style="display:flex;gap:6px">
          <input type="text" id="ter-dosaggio" placeholder="es. 500" style="flex:1">
          <select id="ter-udosaggio" style="width:70px">
            <option>mg</option><option>ml</option><option>mcg</option><option>UI</option><option>%</option><option>altro</option>
          </select>
        </div>
      </div>
    </div>

    <div class="form-group"><label>Motivo assunzione</label><input type="text" id="ter-motivo" placeholder="es. ipertensione, dolore cronico..."></div>

    <div class="form-row">
      <div class="form-group"><label>Scorte disponibili</label><input type="number" id="ter-scorte" value="0" min="0"></div>
      <div class="form-group"><label>Allerta sotto (quantità)</label><input type="number" id="ter-scorte-min" value="5" min="0"></div>
    </div>

    <div class="form-group">
      <label>Stato</label>
      <select id="ter-attiva">
        <option value="true">✅ Attiva</option>
        <option value="false">⏸ Sospesa</option>
      </select>
    </div>

    <div class="form-group">
      <label>Orari di assunzione</label>
      <div class="orari-editor" id="orari-editor"></div>
      <button class="btn-add-orario" onclick="addOrarioRow()">+ Aggiungi orario</button>
    </div>

    <div class="form-group"><label>Note</label><textarea id="ter-note" placeholder="Note aggiuntive..."></textarea></div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-terapia')">Annulla</button>
      <button class="btn btn-primary" onclick="salvaTerapia()">💾 Salva</button>
    </div>
  </div>
</div>

<!-- MODAL ASSUNZIONE MANUALE -->
<div class="modal-overlay" id="modal-ass">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>Registra assunzione</h3>
    <input type="hidden" id="ass-ter-id">
    <input type="hidden" id="ass-orario-id">
    <div class="form-group"><label>Medicina</label><input type="text" id="ass-nome" readonly style="opacity:0.7"></div>
    <div class="form-row">
      <div class="form-group"><label>Data</label><input type="date" id="ass-data"></div>
      <div class="form-group"><label>Ora</label><input type="time" id="ass-ora"></div>
    </div>
    <div class="form-group"><label>Note</label><textarea id="ass-note" placeholder="Note opzionali..."></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-ass')">Annulla</button>
      <button class="btn btn-success" onclick="salvaAssunzione()">✅ Conferma assunzione</button>
    </div>
  </div>
</div>

<!-- MODAL POSTICIPA -->
<div class="modal-overlay" id="modal-posticipa">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>⏰ Posticipa promemoria</h3>
    <input type="hidden" id="post-ter-id">
    <input type="hidden" id="post-orario-id">
    <input type="hidden" id="post-nome">
    <p class="section-sub" id="post-desc" style="margin-bottom:16px"></p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <button class="btn btn-ghost" onclick="posticipa(30)">30 minuti</button>
      <button class="btn btn-ghost" onclick="posticipa(60)">1 ora</button>
      <button class="btn btn-ghost" onclick="posticipa(120)">2 ore</button>
      <button class="btn btn-ghost" onclick="posticipa(180)">3 ore</button>
      <button class="btn btn-ghost" style="grid-column:1/-1;background:#fdecea" onclick="posticipa(5)">🧪 TEST: 5 minuti (da rimuovere dopo)</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal('modal-posticipa')">Annulla</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ovwauqqwwsoyilsshzta.supabase.co';
const SUPABASE_KEY = 'sb_publishable_8IOAUOAijkP0E3yIol1GrQ_jk-UpFAk';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let terapieCache = [];
let currentPage = 'oggi';
let orariRows = [];

// ── INIT ──────────────────────────────────────
const now = new Date();
document.getElementById('topbar-date').innerHTML =
  now.toLocaleDateString('it-IT', {weekday:'long', day:'numeric', month:'long'});

// ── TOAST ─────────────────────────────────────
function showToast(msg, ms=3000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

// ── NAV ───────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  currentPage = name;
  if (name==='oggi')    loadOggi();
  if (name==='terapie') loadTerapie();
  if (name==='storico') { initStorico(); loadStorico(); }
}

// ── UTILITY ───────────────────────────────────
function todayStr() { return new Date().toISOString().split('T')[0]; }
function nowTime()  { return new Date().toTimeString().slice(0,5); }
function fmtDT(dt)  { return new Date(dt).toLocaleString('it-IT', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
function minutiDaOra(ora) {
  const [h,m] = ora.split(':').map(Number);
  return h*60+m;
}
function oraLabel(ora) {
  const min = minutiDaOra(ora);
  if (min < 720) return '🌅 Mattina';
  if (min < 900) return '☀️ Mezzogiorno';
  if (min < 1080) return '🌤 Pomeriggio';
  return '🌙 Sera';
}
function formatoIcon(f) {
  const m = {compressa:'💊',capsula:'💊',gocce:'💧',sciroppo:'🍶',bustina:'📦',fiala:'💉',spray:'🌬',cerotto:'🩹',pomata:'🧴'};
  return m[f] || '💊';
}

// ── POSTICIPI (salvati su Supabase, condivisi tra dispositivi) ─────
async function getPosticipiOggi() {
  const { data, error } = await sb
    .from('terapie_posticipi')
    .select('terapia_id, orario_id, nuovo_orario')
    .eq('data', todayStr());
  if (error) { console.error('[posticipi]', error); return {}; }
  const map = {};
  (data || []).forEach(p => { map[`${p.terapia_id}_${p.orario_id}`] = p.nuovo_orario; });
  return map;
}

async function setPosticipo(terId, orarioId, targetIso) {
  const { error } = await sb.from('terapie_posticipi').upsert({
    terapia_id: terId,
    orario_id: orarioId,
    data: todayStr(),
    nuovo_orario: targetIso
  }, { onConflict: 'terapia_id,orario_id,data' });
  if (error) console.error('[posticipi:set]', error);
}

async function clearPosticipo(terId, orarioId) {
  if (!orarioId || orarioId === 'null') return;
  const { error } = await sb.from('terapie_posticipi')
    .delete()
    .eq('terapia_id', terId)
    .eq('orario_id', orarioId)
    .eq('data', todayStr());
  if (error) console.error('[posticipi:clear]', error);
}

function openModalPosticipa(terId, orarioId, nome) {
  document.getElementById('post-ter-id').value = terId;
  document.getElementById('post-orario-id').value = orarioId;
  document.getElementById('post-nome').value = nome;
  document.getElementById('post-desc').textContent = `${nome} · tra quanto vuoi essere ricontattato?`;
  document.getElementById('modal-posticipa').classList.add('open');
}

async function posticipa(minuti) {
  const terId = document.getElementById('post-ter-id').value;
  const orarioId = document.getElementById('post-orario-id').value;
  const nome = document.getElementById('post-nome').value;
  const target = new Date(Date.now() + minuti * 60000);
  await setPosticipo(terId, orarioId, target.toISOString());
  closeModal('modal-posticipa');
  showToast(`⏰ ${nome} posticipata alle ${target.toTimeString().slice(0,5)}`);
  if ('Notification' in window && Notification.permission === 'granted') {
    setTimeout(() => {
      new Notification(`💊 ${nome}`, {
        body: 'Promemoria posticipato: è ora di prenderla!',
        icon: '/icon-192.png'
      });
    }, minuti * 60000);
  }
  loadOggi();
}

// ── NOTIFICHE ─────────────────────────────────
async function richiediNotifiche() {
  const p = await Notification.requestPermission();
  if (p === 'granted') {
    new Notification('🏥 Terapie Giornaliere', { body: 'Notifiche attivate!' });
    document.getElementById('notif-banner').innerHTML = '';
    programmaNotifiche();
  }
}

async function programmaNotifiche() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const { data: terapie } = await sb.from('terapie').select('*, terapie_orari(*)').eq('attiva', true);
  if (!terapie?.length) return;
  const ora = new Date();
  terapie.forEach(t => {
    (t.terapie_orari || []).forEach(o => {
      const [h, m] = o.ora.split(':').map(Number);
      const target = new Date();
      target.setHours(h, m, 0, 0);
      const diff = target - ora;
      if (diff > 0 && diff < 86400000) {
        setTimeout(() => {
          new Notification(`💊 ${t.nome}`, {
            body: `È ora di prendere ${o.quantita || '1'} ${t.formato} — ${t.motivo || ''}`,
            icon: '/icon-192.png'
          });
        }, diff);
      }
    });
  });

  // ripianifica anche i promemoria posticipati (es. dopo un reload della pagina)
  const posticipi = await getPosticipiOggi();
  Object.entries(posticipi).forEach(([key, iso]) => {
    const diff = new Date(iso).getTime() - Date.now();
    if (diff <= 0 || diff >= 86400000) return;
    const terId = key.split('_')[0];
    const t = terapie.find(x => x.id === terId);
    if (!t) return;
    setTimeout(() => {
      new Notification(`💊 ${t.nome}`, {
        body: 'Promemoria posticipato: è ora di prenderla!',
        icon: '/icon-192.png'
      });
    }, diff);
  });
}

async function checkNotificheAvvio() {
  const banner = document.getElementById('notif-banner');
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    banner.innerHTML = `<div class="notif-banner">🔔 <span>Attiva le notifiche per i promemoria</span><button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="richiediNotifiche()">Attiva</button></div>`;
  } else if (Notification.permission === 'granted') {
    banner.innerHTML = '';
    programmaNotifiche();
  }
}

// ── ALLERTA SCORTE ────────────────────────────
async function checkAllertaScorte() {
  const { data } = await sb.from('terapie').select('nome,scorte,scorte_minime').eq('attiva', true);
  const basse = (data||[]).filter(t => t.scorte <= t.scorte_minime);
  const badge = document.getElementById('badge-scorte');
  const banner = document.getElementById('allerta-scorte-banner');
  if (basse.length) {
    badge.style.display = '';
    banner.innerHTML = `<div class="allerta-scorte">
      <h4>⚠️ Scorte in esaurimento</h4>
      ${basse.map(t=>`<p>💊 ${t.nome} — rimangono solo <strong>${t.scorte}</strong> ${t.scorte <= 0 ? '(ESAURITA!)' : ''}</p>`).join('')}
    </div>`;
    if (Notification.permission === 'granted') {
      basse.forEach(t => {
        new Notification(`⚠️ Scorte in esaurimento`, {
          body: `${t.nome}: rimangono solo ${t.scorte} unità`,
          icon: '/icon-192.png'
        });
      });
    }
  } else {
    badge.style.display = 'none';
    banner.innerHTML = '';
  }
}

// ── RIEPILOGO MATTINO ─────────────────────────
async function checkRiepilogoMattino() {
  if (Notification.permission !== 'granted') return;
  const ora = new Date();
  const ultimoRiepilogo = localStorage.getItem('ultimoRiepilogo');
  const oggi = todayStr();
  if (ultimoRiepilogo === oggi) return;
  if (ora.getHours() >= 7 && ora.getHours() <= 9) {
    const { data: terapie } = await sb.from('terapie').select('nome, terapie_orari(ora)').eq('attiva', true);
    if (terapie?.length) {
      const lista = terapie.map(t => `💊 ${t.nome}`).join(', ');
      new Notification('🌅 Buongiorno Roberto!', {
        body: `Oggi devi prendere: ${lista}`,
        icon: '/icon-192.png'
      });
      localStorage.setItem('ultimoRiepilogo', oggi);
    }
  }
}

// ── OGGI ──────────────────────────────────────
async function loadOggi() {
  const container = document.getElementById('oggi-content');
  container.innerHTML = '<div class="loader">Caricamento...</div>';
  checkAllertaScorte();

  const { data: terapie } = await sb.from('terapie')
    .select('*, terapie_orari(*)')
    .eq('attiva', true)
    .order('nome');

  if (!terapie?.length) {
    container.innerHTML = '<div class="empty"><span class="ei">💊</span><p>Nessuna terapia attiva.<br>Vai su <strong>Terapie</strong> per aggiungerne una.</p></div>';
    document.getElementById('stats-oggi').innerHTML = '';
    updateBadgeOggi(0);
    return;
  }

  const oggi = todayStr();
  const { data: assunzioniOggi } = await sb.from('terapie_assunzioni')
    .select('terapia_id, orario_id')
    .gte('data_ora', oggi+'T00:00:00')
    .lte('data_ora', oggi+'T23:59:59')
    .eq('assunta', true);

  const assunte = new Set((assunzioniOggi||[]).map(a => `${a.terapia_id}_${a.orario_id}`));
  const nowMin = minutiDaOra(nowTime());
  const posticipi = await getPosticipiOggi();

  // raccoglie tutti gli slot orari
  let slots = [];
  terapie.forEach(t => {
    (t.terapie_orari || []).forEach(o => {
      const key = `${t.id}_${o.id}`;
      const done = assunte.has(key);
      let oraMin = minutiDaOra(o.ora.slice(0,5));
      let oraDisplay = o.ora.slice(0,5);
      let posticipata = false;
      if (!done && posticipi[key]) {
        const d = new Date(posticipi[key]);
        oraMin = d.getHours()*60 + d.getMinutes();
        oraDisplay = d.toTimeString().slice(0,5);
        posticipata = true;
      }
      slots.push({ t, o, done, oraMin, oraDisplay, posticipata, past: !done && oraMin < nowMin - 30 });
    });
    // terapia senza orari
    if (!t.terapie_orari?.length) {
      const key = `${t.id}_null`;
      slots.push({ t, o: null, done: assunte.has(key), oraMin: 0, oraDisplay: null, posticipata: false, past: false });
    }
  });

  slots.sort((a,b) => a.oraMin - b.oraMin);

  // stats
  const totale = slots.length;
  const fatte = slots.filter(s=>s.done).length;
  const mancanti = totale - fatte;
  updateBadgeOggi(mancanti);

  document.getElementById('stats-oggi').innerHTML = `
    <div class="stat-card"><div class="num">${totale}</div><div class="lbl">Totale oggi</div></div>
    <div class="stat-card"><div class="num" style="color:var(--accent2)">${fatte}</div><div class="lbl">Prese</div></div>
    <div class="stat-card"><div class="num" style="color:${mancanti>0?'var(--danger)':'var(--accent2)'}">${mancanti}</div><div class="lbl">Da prendere</div></div>`;

  // raggruppa per ora
  const gruppi = {};
  slots.forEach(s => {
    const key = s.o ? s.oraDisplay : 'al bisogno';
    if (!gruppi[key]) gruppi[key] = [];
    gruppi[key].push(s);
  });

  container.innerHTML = Object.entries(gruppi).map(([ora, items]) => `
    <div class="oggi-slot">
      <div class="oggi-slot-header">
        <div class="oggi-slot-time">${ora}</div>
        <div class="oggi-slot-label">${ora !== 'al bisogno' ? oraLabel(ora) : '📋 Al bisogno'}</div>
      </div>
      ${items.map(({t, o, done, past, posticipata}) => {
        const sc = parseInt(t.scorte);
        const scHtml = sc <= t.scorte_minime
          ? `<span class="oggi-scorte" style="background:#fdecea;color:var(--danger)">⚠️ ${sc}</span>`
          : `<span class="oggi-scorte" style="background:#e8f5e0;color:var(--accent2)">${sc}</span>`;
        const nomeSafe = t.nome.replace(/'/g,"\\'");
        return `<div class="oggi-item ${done?'done':''} ${past?'past':''}">
          <div class="oggi-dot ${done?'done':''} ${past?'past':''}"></div>
          <div class="oggi-info">
            <div class="oggi-nome">${formatoIcon(t.formato)} ${t.nome} ${o?'· '+o.quantita+' '+t.formato:''}</div>
            <div class="oggi-sub">${t.principio_attivo||''} ${t.dosaggio?t.dosaggio+' '+t.unita_dosaggio:''} ${t.motivo?'· '+t.motivo:''} ${posticipata?'· ⏰ posticipata':''}</div>
          </div>
          ${scHtml}
          ${done
            ? '<span class="badge badge-green" style="margin-left:8px">✅</span>'
            : `<div style="display:flex;gap:6px;margin-left:8px;flex-wrap:wrap;justify-content:flex-end">
                <button class="btn btn-success btn-sm" onclick="openModalAssunzione('${t.id}','${o?.id||''}','${nomeSafe}')">✅ Presa</button>
                ${o ? `<button class="btn btn-ghost btn-sm" onclick="openModalPosticipa('${t.id}','${o.id}','${nomeSafe}')">⏰</button>` : ''}
               </div>`
          }
        </div>`;
      }).join('')}
    </div>`).join('');
}

function updateBadgeOggi(n) {
  const badge = document.getElementById('badge-oggi');
  if (n > 0) { badge.style.display=''; badge.textContent=n; }
  else badge.style.display='none';
}

// ── ASSUNZIONE ────────────────────────────────
function openModalAssunzione(terId, orarioId, nome) {
  document.getElementById('ass-ter-id').value = terId;
  document.getElementById('ass-orario-id').value = orarioId;
  document.getElementById('ass-nome').value = nome;
  document.getElementById('ass-data').value = todayStr();
  document.getElementById('ass-ora').value = nowTime();
  document.getElementById('ass-note').value = '';
  document.getElementById('modal-ass').classList.add('open');
}

async function salvaAssunzione() {
  const terId = document.getElementById('ass-ter-id').value;
  const orarioId = document.getElementById('ass-orario-id').value;
  const d = document.getElementById('ass-data').value;
  const t = document.getElementById('ass-ora').value;
  await sb.from('terapie_assunzioni').insert({
    terapia_id: terId,
    orario_id: orarioId || null,
    data_ora: `${d}T${t}:00`,
    assunta: true,
    note: document.getElementById('ass-note').value.trim() || null,
  });
  // scala scorte
  const { data: ter } = await sb.from('terapie').select('scorte').eq('id', terId).single();
  if (ter && ter.scorte > 0) await sb.from('terapie').update({ scorte: ter.scorte - 1 }).eq('id', terId);
  await clearPosticipo(terId, orarioId);
  closeModal('modal-ass');
  showToast('✅ Assunzione registrata!');
  loadOggi();
}

// ── TERAPIE ───────────────────────────────────
async function loadTerapie() {
  const container = document.getElementById('lista-terapie');
  container.innerHTML = '<div class="loader">Caricamento...</div>';
  const { data } = await sb.from('terapie').select('*, terapie_orari(*)').order('nome');
  terapieCache = data || [];
  if (!terapieCache.length) {
    container.innerHTML = '<div class="empty"><span class="ei">💊</span><p>Nessuna medicina. Aggiungine una!</p></div>';
    return;
  }
  container.innerHTML = terapieCache.map(t => {
    const sc = parseInt(t.scorte);
    const scMax = Math.max(sc, t.scorte_minime * 3, 30);
    const scPct = Math.round(sc / scMax * 100);
    const scColor = sc <= 0 ? 'var(--danger)' : sc <= t.scorte_minime ? 'var(--warn)' : 'var(--accent2)';
    const orariHtml = (t.terapie_orari||[]).length
      ? (t.terapie_orari||[]).sort((a,b)=>a.ora.localeCompare(b.ora)).map(o =>
          `<span class="orario-tag">🕐 ${o.ora.slice(0,5)} · ${o.quantita} ${t.formato}</span>`
        ).join('')
      : '<span style="font-size:11px;color:var(--muted)">Nessun orario impostato</span>';
    return `<div class="terapia-item">
      <div class="terapia-header">
        <div class="terapia-icon">${formatoIcon(t.formato)}</div>
        <div class="terapia-info">
          <h4>${t.nome} ${t.attiva?'':'<span class="badge badge-blue">sospesa</span>'}</h4>
          <p>${t.principio_attivo||''} ${t.dosaggio?t.dosaggio+' '+t.unita_dosaggio:''} ${t.motivo?'· '+t.motivo:''}</p>
        </div>
        <div class="terapia-actions">
          <button class="btn btn-primary btn-sm" onclick="openModalAssunzione('${t.id}','','${t.nome.replace(/'/g,"\\'")}')">✅</button>
          <button class="btn btn-ghost btn-sm" onclick="editTerapia('${t.id}')">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="deleteTerapia('${t.id}','${t.nome}')">🗑</button>
        </div>
      </div>
      <div class="terapia-orari">${orariHtml}</div>
      <div class="scorte-bar">
        <div class="scorte-bar-label">
          <span>Scorte: <strong>${sc}</strong> ${t.formato}${sc===1?'':'e'}</span>
          <span style="color:${sc<=t.scorte_minime?'var(--danger)':'var(--muted)'}">allerta sotto ${t.scorte_minime}</span>
        </div>
        <div class="scorte-bar-bg"><div class="scorte-bar-fill" style="width:${scPct}%;background:${scColor}"></div></div>
      </div>
    </div>`;
  }).join('');
}

// ── ORARI EDITOR ──────────────────────────────
function addOrarioRow(ora='', qty='1') {
  const id = Date.now();
  orariRows.push(id);
  const div = document.createElement('div');
  div.className = 'orario-row';
  div.id = 'orario-row-'+id;
  div.innerHTML = `
    <input type="time" value="${ora}" placeholder="es. 08:00" id="orario-time-${id}">
    <input type="text" value="${qty}" placeholder="Quantità" id="orario-qty-${id}" style="max-width:80px">
    <button class="btn-remove-orario" onclick="removeOrarioRow(${id})">✕</button>`;
  document.getElementById('orari-editor').appendChild(div);
}

function removeOrarioRow(id) {
  orariRows = orariRows.filter(r => r !== id);
  document.getElementById('orario-row-'+id)?.remove();
}

function resetOrariEditor(orari=[]) {
  document.getElementById('orari-editor').innerHTML = '';
  orariRows = [];
  if (orari.length) orari.forEach(o => addOrarioRow(o.ora.slice(0,5), o.quantita));
  else addOrarioRow();
}

// ── MODAL TERAPIA ─────────────────────────────
function openModalTerapia() {
  document.getElementById('ter-id').value = '';
  ['ter-nome','ter-principio','ter-dosaggio','ter-motivo','ter-note'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('ter-formato').value = 'compressa';
  document.getElementById('ter-udosaggio').value = 'mg';
  document.getElementById('ter-scorte').value = '0';
  document.getElementById('ter-scorte-min').value = '5';
  document.getElementById('ter-attiva').value = 'true';
  resetOrariEditor();
  document.getElementById('modal-terapia-title').textContent = 'Aggiungi medicina';
  document.getElementById('modal-terapia').classList.add('open');
}

async function editTerapia(id) {
  const t = terapieCache.find(x => x.id === id); if (!t) return;
  document.getElementById('ter-id').value = t.id;
  document.getElementById('ter-nome').value = t.nome;
  document.getElementById('ter-formato').value = t.formato || 'compressa';
  document.getElementById('ter-principio').value = t.principio_attivo || '';
  document.getElementById('ter-dosaggio').value = t.dosaggio || '';
  document.getElementById('ter-udosaggio').value = t.unita_dosaggio || 'mg';
  document.getElementById('ter-motivo').value = t.motivo || '';
  document.getElementById('ter-scorte').value = t.scorte || 0;
  document.getElementById('ter-scorte-min').value = t.scorte_minime || 5;
  document.getElementById('ter-attiva').value = String(t.attiva);
  document.getElementById('ter-note').value = t.note || '';
  resetOrariEditor(t.terapie_orari || []);
  document.getElementById('modal-terapia-title').textContent = 'Modifica medicina';
  document.getElementById('modal-terapia').classList.add('open');
}

async function salvaTerapia() {
  const nome = document.getElementById('ter-nome').value.trim();
  if (!nome) { alert('Inserisci il nome della medicina.'); return; }
  const id = document.getElementById('ter-id').value;
  const payload = {
    nome,
    formato: document.getElementById('ter-formato').value,
    principio_attivo: document.getElementById('ter-principio').value.trim() || null,
    dosaggio: document.getElementById('ter-dosaggio').value.trim() || null,
    unita_dosaggio: document.getElementById('ter-udosaggio').value,
    motivo: document.getElementById('ter-motivo').value.trim() || null,
    scorte: parseInt(document.getElementById('ter-scorte').value) || 0,
    scorte_minime: parseInt(document.getElementById('ter-scorte-min').value) || 5,
    attiva: document.getElementById('ter-attiva').value === 'true',
    note: document.getElementById('ter-note').value.trim() || null,
  };

  let terId = id;
  if (id) {
    await sb.from('terapie').update(payload).eq('id', id);
    await sb.from('terapie_orari').delete().eq('terapia_id', id);
  } else {
    const { data: ins } = await sb.from('terapie').insert(payload).select().single();
    terId = ins?.id;
  }

  // salva orari
  for (const rid of orariRows) {
    const ora = document.getElementById('orario-time-'+rid)?.value;
    const qty = document.getElementById('orario-qty-'+rid)?.value || '1';
    if (ora) await sb.from('terapie_orari').insert({ terapia_id: terId, ora, quantita: qty });
  }

  closeModal('modal-terapia');
  loadTerapie();
  checkAllertaScorte();
  showToast('✅ Medicina salvata!');
}

async function deleteTerapia(id, nome) {
  if (!confirm(`Eliminare '${nome}' e tutto il suo storico?`)) return;
  await sb.from('terapie').delete().eq('id', id);
  loadTerapie();
  showToast('🗑 Medicina eliminata');
}

// ── STORICO ───────────────────────────────────
function initStorico() {
  const oggi = todayStr();
  const un_mese = new Date(); un_mese.setDate(un_mese.getDate() - 30);
  document.getElementById('st-dal').value = un_mese.toISOString().split('T')[0];
  document.getElementById('st-al').value = oggi;
}

async function loadStorico() {
  const container = document.getElementById('lista-storico');
  container.innerHTML = '<div class="loader">Caricamento...</div>';
  const dal = document.getElementById('st-dal').value;
  const al  = document.getElementById('st-al').value;
  let query = sb.from('terapie_assunzioni')
    .select('*, terapie(nome,formato)')
    .order('data_ora', { ascending: false });
  if (dal) query = query.gte('data_ora', dal+'T00:00:00');
  if (al)  query = query.lte('data_ora', al+'T23:59:59');
  const { data } = await query.limit(200);
  if (!data?.length) { container.innerHTML='<div class="empty"><span class="ei">📋</span><p>Nessuna assunzione trovata.</p></div>'; return; }
  container.innerHTML = data.map(a => `
    <div class="storico-item">
      <div class="storico-check">${a.assunta?'✅':'⏭'}</div>
      <div class="storico-info">
        <h4>${formatoIcon(a.terapie?.formato||'')} ${a.terapie?.nome||'—'}</h4>
        <p>${fmtDT(a.data_ora)} ${a.note?'· '+a.note:''}</p>
      </div>
      <button class="btn btn-danger btn-sm" onclick="deleteAssunzione('${a.id}')">🗑</button>
    </div>`).join('');
}

async function deleteAssunzione(id) {
  if (!confirm('Eliminare questa registrazione?')) return;
  await sb.from('terapie_assunzioni').delete().eq('id', id);
  loadStorico();
  showToast('🗑 Eliminata');
}

// ── MODAL UTILS ───────────────────────────────
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

// ── SERVICE WORKER ────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(e => console.log('SW:', e));
}

// ── INIT ──────────────────────────────────────
checkNotificheAvvio();
checkRiepilogoMattino();
loadOggi();
</script>
